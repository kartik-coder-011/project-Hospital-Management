<body>

   <!--Header with Emergency Button beside 24/7 -->
     <header class="app-header">
      <div class="logo">
        <i class="fas fa-heartbeat"></i>
        <span>MediCare<span class="light">Connect</span></span>
      </div>

      <div class="header-right">
  <a href="emergency.html" class="emergency-header-btn" onclick="localStorage.setItem('previous_page', 'index.html');">
    <i class="fas fa-ambulance"></i> 🚨 Emergency
</a>
  <div class="header-badge">24/7 Support</div>
</div>
    </header>

    <!-- Check if user already registered -->
    <div id="userLoggedInBanner" class="user-logged-banner" style="display: none;">
      <div class="banner-content">
        <i class="fas fa-check-circle"></i>
        <div>
          <strong>Welcome back, <span id="loggedUserName"></span>!</strong>
          <p>You're already registered. <a href="next.html" class="goto-hospitals-link">Click here to find hospitals</a> or update your info below.</p>
        </div>
        <button id="clearUserBtn" class="clear-user-btn">New User? Register Again</button>
      </div>
    </div>

    <main class="main-centered">
      <!-- PATIENT REGISTRATION SECTION - Centered -->
      <div class="card registration-card centered-card">
        <div class="card-header">
          <i class="fas fa-user-plus"></i>
          <h2>Patient Registration</h2>
        </div>
        <form id="registrationForm" class="registration-form">
          <div class="input-group">
            <label><i class="fas fa-user"></i> Full Name</label>
            <input type="text" id="fullName" placeholder="e.g., John Carter" autocomplete="off">
          </div>
          <div class="input-row">
            <div class="input-group half">
              <label><i class="fas fa-calendar-alt"></i> Age</label>
              <input type="number" id="age" placeholder="Age" min="0" max="120">
            </div>
            <div class="input-group half">
              <label><i class="fas fa-venus-mars"></i> Gender</label>
              <select id="gender">
                <option value="">Select</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
              </select>
            </div>
          </div>
          <div class="input-group">
            <label><i class="fas fa-phone-alt"></i> Mobile Number</label>
            <input type="tel" id="mobileNumber" placeholder="+91 98765 43210" autocomplete="off">
          </div>
          <div class="input-group">
            <label><i class="fas fa-notes-medical"></i> Problem / Symptoms</label>
            <textarea id="symptoms" rows="3" placeholder="Describe symptoms, pain location, duration..."></textarea>
          </div>
          <div class="input-group">
            <label><i class="fas fa-map-marker-alt"></i> Address / Location</label>
            <input type="text" id="address" placeholder="City, area or full address" autocomplete="off">
          </div>
          <button type="button" id="findHospitalBtn" class="btn-find-hospital">
            <i class="fas fa-hospital-user"></i> Find Hospital
          </button>
        </form>
        <div class="form-note">
          <i class="fas fa-shield-alt"></i> Your data is securely stored
        </div>
      </div>
    </main>

    <footer class="app-footer">
      <p>© 2025 MediCareConnect — instant support, modern care</p>
    </footer>
  </div>
