<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediCareConnect — Find Your Hospital</title>
  <meta name="description" content="Find the nearest hospital matched to your symptoms and book an appointment slot instantly.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="enhancements.css">
</head>
<body>
  <div class="app-wrapper">
    <!-- Header with Emergency Button -->
    <header class="dashboard-header anim-fade-down">
      <div class="header-left">
        <a href="index.html" class="back-home-btn">
          <i class="fas fa-arrow-left"></i> Back to Home
        </a>
      </div>
      <div class="header-logo">
        <i class="fas fa-hospital-user logo-pulse"></i>
        <span>MediCare<span class="light">Connect</span></span>
      </div>
      <div class="header-right">
        <a href="emergency.html" class="emergency-header-btn" onclick="localStorage.setItem('previous_page', 'next.html');">
          <i class="fas fa-ambulance"></i> 🚨 Emergency
        </a>
        <div class="header-greeting">
          <i class="fas fa-user-circle"></i>
          <span id="userNameDisplay">Patient</span>
        </div>
      </div>
    </header>

    <!-- User Info Summary -->
    <div class="user-summary">
      <div class="summary-icon"><i class="fas fa-notes-medical"></i></div>
      <div class="summary-details">
        <p><strong>Symptoms:</strong> <span id="displaySymptoms">-</span></p>
        <p><strong>Location:</strong> <span id="displayLocation">-</span></p>
        <p><strong>Age/Gender:</strong> <span id="displayAgeGender">-</span></p>
      </div>
      <div class="summary-badge" id="filterTypeBadge">Recommended: General</div>
    </div>

    <!-- Refine Button -->
    <div class="refine-section">
      <button id="refineByProblemBtn" class="refine-btn">
        <i class="fas fa-stethoscope"></i> Recommend Hospitals Based on My Problem
      </button>
    </div>
   <!-- Add this after the refine button section -->
<div class="update-symptoms-section">
    <button id="updateSymptomsBtn" class="update-symptoms-btn">
    <i class="fas fa-edit"></i> Update My Symptoms
</button>
</div>

    <!-- Hospitals Grid -->
    <div class="hospitals-grid" id="hospitalsGrid">
      <!-- Hospitals will appear here -->
    </div>
  </div>

  <!-- Slot Modal -->
  <div id="slotModal" class="modal">
    <div class="modal-content modal-large">
      <div class="modal-header">
        <h3><i class="fas fa-calendar-check"></i> Book Appointment</h3>
        <span class="close-modal">&times;</span>
      </div>
      <div class="modal-body">
        <div class="hospital-info-section">
          <i class="fas fa-hospital"></i>
          <div>
            <p class="modal-hospital-name" id="modalHospitalName">Hospital Name</p>
          </div>
        </div>
        <div class="date-selector">
          <label><i class="fas fa-calendar-day"></i> Select Date:</label>
          <input type="date" id="bookingDate" class="date-input">
        </div>
        <div class="slot-sections">
          <div class="slot-section">
            <div class="section-title"><i class="fas fa-sun"></i><span>Morning Slots</span></div>
            <div class="slot-group" id="morningSlots"></div>
          </div>
          <div class="slot-section">
            <div class="section-title"><i class="fas fa-moon"></i><span>Evening Slots</span></div>
            <div class="slot-group" id="eveningSlots"></div>
          </div>
        </div>
        <button id="confirmBookingBtn" class="confirm-btn">Confirm Booking</button>
      </div>
    </div>
  </div>

  <div id="bookingToast" class="toast-message"></div>

  <script src="next-script.js"></script>
</body>
</html>
